<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ezan Vakti & Akıllı Skor</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1551041777-ed318464f771?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; z-index: -1;
        }
        .container { width: 90%; max-width: 400px; margin-top: 20px; display: none; text-align: center; padding-bottom: 110px; }
        .active { display: block; animation: fadeIn 0.4s; }
        
        .vakit-item {
            display: flex; justify-content: space-between; padding: 12px 15px;
            background: rgba(255,255,255,0.07); border-radius: 12px; margin-bottom: 8px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        #countdown { font-size: 42px; color: var(--gold); font-weight: bold; margin: 15px 0; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .hole { width: 100px; height: 100px; background: #1a1a1a; border-radius: 50%; position: relative; border: 2px solid #333; overflow: hidden; }
        .mole { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; animation: popUp 0.6s ease-out; }

        .navbar {
            position: fixed; bottom: 0; width: 100%; background: #111;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 2px solid var(--gold); z-index: 100;
        }
        .nav-btn { color: var(--gold); font-size: 12px; cursor: pointer; text-align: center; opacity: 0.6; }
        .nav-btn.active-nav { opacity: 1; font-weight: bold; }

        .game-info { background: rgba(212,175,55,0.1); padding: 10px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-around; border: 1px solid var(--gold); }
        
        #leaderboard { 
            margin-top: 20px; text-align: left; background: rgba(0,0,0,0.7); 
            padding: 15px; border-radius: 12px; display: none; 
            max-height: 250px; overflow-y: auto; border: 1px solid var(--gold);
        }
        .score-entry { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; font-size: 14px; }

        @keyframes popUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div id="vakitler" class="container active">
        <h2 style="color:var(--gold)">🕌 Ezan Vakitleri</h2>
        <div id="countdown">--:--:--</div>
        <div id="vakit-listesi">Yükleniyor...</div>
        <div id="hadis-box" style="margin-top:20px; font-style:italic; color:#ccc; background:rgba(212,175,55,0.1); padding:10px; border-radius:10px;"></div>
    </div>

    <div id="zikirmatik" class="container">
        <h2 style="color:var(--gold)">📿 Zikirmatik</h2>
        <div id="zikir-ekran" style="font-size:60px; margin:40px 0;">0</div>
        <button onclick="zikirArtir()" style="width:120px; height:120px; border-radius:50%; border:4px solid var(--gold); background:none; color:white; font-size:24px; cursor:pointer;">ÇEK</button>
        <br><br>
        <button onclick="zikirSifirla()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:5px;">Sıfırla</button>
    </div>

    <div id="oyun" class="container">
        <h2 style="color:var(--gold)">🎮 Yıldız Avı</h2>
        <div id="player-display" style="font-size:12px; margin-bottom:5px; color:var(--gold)"></div>
        <div class="game-info">
            <div>Süre: <span id="timer" style="color:#e74c3c">30</span>s</div>
            <div>Skor: <span id="score">0</span></div>
        </div>
        <div class="grid">
            <div class="hole" id="h0"></div><div class="hole" id="h1"></div><div class="hole" id="h2"></div>
            <div class="hole" id="h3"></div><div class="hole" id="h4"></div><div class="hole" id="h5"></div>
            <div class="hole" id="h6"></div><div class="hole" id="h7"></div><div class="hole" id="h8"></div>
        </div>
        <button id="start-btn" onclick="oyunBaslat()" style="margin-top:20px; background:var(--gold); border:none; padding:12px 25px; border-radius:8px; font-weight:bold; color:black;">OYUNU BAŞLAT</button>
        
        <p onclick="skorlariGoster()" style="color:var(--gold); text-decoration:underline; cursor:pointer; margin-top:20px; font-size: 14px;">🏆 Tüm Sıralamayı Gör</p>
        <div id="leaderboard"></div>
    </div>

    <div class="navbar">
        <div class="nav-btn active-nav" onclick="tabSec('vakitler', this)">🕌<br>Vakitler</div>
        <div class="nav-btn" onclick="tabSec('zikirmatik', this)">📿<br>Zikirmatik</div>
        <div class="nav-btn" onclick="tabSec('oyun', this)">🎮<br>Oyun</div>
    </div>

    <script>
        let aksamVakti = "", zikirCount = 0, score = 0, timeLeft = 30, gameActive = false, timerInterval;
        let leaderData = JSON.parse(localStorage.getItem("leaderData")) || [];
        let playerName = localStorage.getItem("playerName") || "";

        // İsim kontrolü
        if(playerName) document.getElementById('player-display').innerText = "Oyuncu: " + playerName;

        async function vakitleriGetir() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Istanbul&country=Turkey&method=13');
                const data = await res.json();
                const t = data.data.timings;
                aksamVakti = t.Maghrib;
                const vakitler = [["İmsak", t.Fajr], ["Güneş", t.Sunrise], ["Öğle", t.Dhuhr], ["İkindi", t.Asr], ["Akşam", t.Maghrib], ["Yatsı", t.Isha]];
                document.getElementById('vakit-listesi').innerHTML = vakitler.map(v => `<div class="vakit-item"><b>${v[0]}</b><span>${v[1]}</span></div>`).join('');
                document.getElementById('hadis-box').innerText = "📜 Oruç tutun, sıhhat bulun.";
            } catch(e) { console.log("Hata!"); }
        }

        setInterval(() => {
            if(!aksamVakti) return;
            const simdi = new Date(); const hedef = new Date();
            hedef.setHours(...aksamVakti.split(':'), 0);
            let fark = hedef - simdi;
            if(fark < 0) { document.getElementById('countdown').innerText = "Hayırlı İftarlar!"; return; }
            const h = Math.floor(fark/3600000).toString().padStart(2,'0');
            const m = Math.floor((fark%3600000)/60000).toString().padStart(2,'0');
            const s = Math.floor((fark%60000)/1000).toString().padStart(2,'0');
            document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
        }, 1000);

        function tabSec(id, btn) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active-nav');
            if(id !== 'oyun') oyunDurdur();
        }

        function zikirArtir() { zikirCount++; document.getElementById('zikir-ekran').innerText = zikirCount; }
        function zikirSifirla() { zikirCount = 0; document.getElementById('zikir-ekran').innerText = 0; }

        function oyunBaslat() {
            if(!playerName) {
                playerName = prompt("Sıralama için ismini yaz (Bir kez sorulacak):") || "Misafir";
                localStorage.setItem("playerName", playerName);
                document.getElementById('player-display').innerText = "Oyuncu: " + playerName;
            }
            score = 0; timeLeft = 30; gameActive = true;
            document.getElementById('score').innerText = 0;
            document.getElementById('timer').innerText = 30;
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('leaderboard').style.display = 'none';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) oyunBitti();
            }, 1000);
            moleCikar();
        }

        function moleCikar() {
            if(!gameActive) return;
            const hole = document.getElementById("h" + Math.floor(Math.random()*9));
            const isBomb = Math.random() > 0.8;
            const item = document.createElement('div');
            item.className = 'mole';
            item.innerHTML = isBomb ? '💣' : '⭐';
            item.onclick = (e) => { 
                e.stopPropagation();
                if(gameActive) { 
                    isBomb ? score -= 100 : score += 50; 
                    document.getElementById('score').innerText = score; 
                    item.remove(); 
                } 
            };
            hole.appendChild(item);
            setTimeout(() => { if(item.parentNode) item.remove(); if(gameActive) moleCikar(); }, 800);
        }

        function oyunBitti() {
            gameActive = false; clearInterval(timerInterval);
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('start-btn').innerText = 'YENİDEN DENE';
            
            // Skor Güncelleme Mantığı
            let userIndex = leaderData.findIndex(u => u.name === playerName);
            
            if(userIndex > -1) {
                // Eğer oyuncu listede varsa ve yeni skoru eskisinden yüksekse güncelle
                if(score > leaderData[userIndex].score) {
                    leaderData[userIndex].score = score;
                }
            } else {
                // Oyuncu listede yoksa yeni ekle
                leaderData.push({name: playerName, score: score});
            }

            leaderData.sort((a,b) => b.score - a.score);
            localStorage.setItem("leaderData", JSON.stringify(leaderData));
            skorlariGoster();
        }

        function oyunDurdur() { gameActive = false; clearInterval(timerInterval); document.querySelectorAll('.mole').forEach(m => m.remove()); document.getElementById('start-btn').style.display = 'inline-block'; }

        function skorlariGoster() {
            const lb = document.getElementById('leaderboard');
            lb.style.display = 'block';
            lb.innerHTML = "<b style='color:var(--gold)'>🏆 Sıralama (En İyi Skorun):</b><hr style='border:0.5px solid #333; margin:10px 0;'>" + 
                leaderData.map((l, i) => `
                <div class="score-entry">
                    <span style="${l.name === playerName ? 'color:var(--gold); font-weight:bold;' : ''}">${i+1}. ${l.name}</span>
                    <span style="color:var(--gold); font-weight:bold;">${l.score}</span>
                </div>`).join('');
        }

        vakitleriGetir();
    </script>
</body>
</html>
