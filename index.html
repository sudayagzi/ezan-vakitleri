<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezan Vakti & Oyun</title>
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1551041777-ed318464f771?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; z-index: -1;
        }
        .container { width: 90%; max-width: 400px; margin-top: 20px; display: none; text-align: center; padding-bottom: 100px; }
        .active { display: block; animation: fadeIn 0.4s; }
        
        /* Vakit Kartları */
        .vakit-item {
            display: flex; justify-content: space-between; padding: 12px 15px;
            background: rgba(255,255,255,0.07); border-radius: 12px; margin-bottom: 8px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        #countdown { font-size: 42px; color: var(--gold); font-weight: bold; margin: 15px 0; }

        /* Oyun Alanı (Köstebek Mantığı) */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .hole { width: 100px; height: 100px; background: #1a1a1a; border-radius: 50%; position: relative; border: 2px solid #333; overflow: hidden; }
        .mole { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; animation: popUp 0.6s ease-out; }

        /* Alt Menü */
        .navbar {
            position: fixed; bottom: 0; width: 100%; background: #111;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 2px solid var(--gold); z-index: 100;
        }
        .nav-btn { color: var(--gold); font-size: 12px; cursor: pointer; text-align: center; opacity: 0.6; }
        .nav-btn.active-nav { opacity: 1; font-weight: bold; }

        @keyframes popUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div id="vakitler" class="container active">
        <h2 style="color:var(--gold)">🕌 Ezan Vakitleri</h2>
        <div id="countdown">--:--:--</div>
        <div id="vakit-listesi">Yükleniyor...</div>
        <div id="hadis-box" style="margin-top:20px; font-style:italic; color:#ccc; background:rgba(212,175,55,0.1); padding:10px; border-radius:10px;"></div>
    </div>

    <div id="zikirmatik" class="container">
        <h2 style="color:var(--gold)">📿 Zikirmatik</h2>
        <div id="zikir-ekran" style="font-size:60px; margin:40px 0;">0</div>
        <button onclick="zikirArtir()" style="width:120px; height:120px; border-radius:50%; border:4px solid var(--gold); background:none; color:white; font-size:24px; cursor:pointer;">ÇEK</button>
        <br><br>
        <button onclick="zikirSifirla()" style="background:red; color:white; border:none; padding:8px 15px; border-radius:5px;">Sıfırla</button>
    </div>

    <div id="oyun" class="container">
        <h2 style="color:var(--gold)">🎮 Yıldız Avı</h2>
        <div style="font-size:20px; margin-bottom:10px;">Puan: <span id="score">0</span></div>
        <div class="grid">
            <div class="hole" id="h0"></div><div class="hole" id="h1"></div><div class="hole" id="h2"></div>
            <div class="hole" id="h3"></div><div class="hole" id="h4"></div><div class="hole" id="h5"></div>
            <div class="hole" id="h6"></div><div class="hole" id="h7"></div><div class="hole" id="h8"></div>
        </div>
        <p style="font-size:12px; color:gray; margin-top:15px;">⭐ +50 Puan | 💣 -100 Puan</p>
    </div>

    <div class="navbar">
        <div class="nav-btn active-nav" onclick="tabSec('vakitler', this)">🕌<br>Vakitler</div>
        <div class="nav-btn" onclick="tabSec('zikirmatik', this)">📿<br>Zikirmatik</div>
        <div class="nav-btn" onclick="tabSec('oyun', this)">🎮<br>Oyun</div>
    </div>

    <script>
        let aksamVakti = "";
        let zikirCount = 0;
        let score = 0;
        let gameActive = false;

        // --- API VE VAKİTLER ---
        async function vakitleriGetir() {
            const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Istanbul&country=Turkey&method=13');
            const data = await res.json();
            const t = data.data.timings;
            aksamVakti = t.Maghrib;

            const vakitler = [
                ["İmsak (Sahur)", t.Fajr],
                ["Güneş", t.Sunrise],
                ["Öğle", t.Dhuhr],
                ["İkindi", t.Asr],
                ["Akşam (İftar)", t.Maghrib],
                ["Yatsı", t.Isha]
            ];

            document.getElementById('vakit-listesi').innerHTML = vakitler.map(v => `
                <div class="vakit-item">
                    <span style="color:var(--gold); font-weight:bold;">${v[0]}</span>
                    <span>${v[1]}</span>
                </div>
            `).join('');

            const hadisler = [
                "Oruç tutunuz ki sıhhat bulasınız.",
                "Sahur yapınız, sahurda bereket vardır.",
                "Ramazan, evveli rahmet olan bir aydır."
            ];
            document.getElementById('hadis-box').innerText = "📜 " + hadisler[new Date().getDate() % 3];
        }

        setInterval(() => {
            if(!aksamVakti) return;
            const simdi = new Date();
            const hedef = new Date();
            hedef.setHours(...aksamVakti.split(':'), 0);
            let fark = hedef - simdi;
            if(fark < 0) { document.getElementById('countdown').innerText = "Hayırlı İftarlar!"; return; }
            const h = Math.floor(fark/3600000).toString().padStart(2,'0');
            const m = Math.floor((fark%3600000)/60000).toString().padStart(2,'0');
            const s = Math.floor((fark%60000)/1000).toString().padStart(2,'0');
            document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
        }, 1000);

        // --- SEKME YÖNETİMİ ---
        function tabSec(id, btn) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active-nav');
            gameActive = (id === 'oyun');
            if(gameActive) oyunBaslat();
        }

        // --- ZİKİRMATİK ---
        function zikirArtir() { zikirCount++; document.getElementById('zikir-ekran').innerText = zikirCount; }
        function zikirSifirla() { zikirCount = 0; document.getElementById('zikir-ekran').innerText = 0; }

        // --- OYUN (KÖSTEBEK MANTIĞI) ---
        function oyunBaslat() {
            if(!gameActive) return;
            const holeId = "h" + Math.floor(Math.random()*9);
            const hole = document.getElementById(holeId);
            const isBomb = Math.random() > 0.8; 

            const item = document.createElement('div');
            item.className = 'mole';
            item.innerHTML = isBomb ? '💣' : '⭐';
            
            item.onclick = () => {
                if(isBomb) score -= 100; else score += 50;
                document.getElementById('score').innerText = score;
                item.remove();
            };

            hole.appendChild(item);
            setTimeout(() => { if(item) item.remove(); if(gameActive) oyunBaslat(); }, 800);
        }

        vakitleriGetir();
    </script>
</body>
</html>
